spring:
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: profile, email
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email   
  datasource:
    url: jdbc:postgresql://${SUPABASE_HOST}:${SUPABASE_PORT}/${SUPABASE_DB}?sslmode=require
    username: ${SUPABASE_USER}
    password: ${SUPABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 5
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1200000
  jpa:
    hibernate:
      ddl-auto: update          
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
    show-sql: true

jwt:
  secret: ${JWT_SECRET:mySuperSecretKeyWithAtLeast32CharactersLongForHS256!!}
  expiration: 3600000

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001
  oauth2:
    redirect-uri: http://localhost:3000/oauth2/redirect

paymongo:
  secret-key: ${PAYMONGO_SECRET_KEY:}
  statement-descriptor: ${PAYMONGO_STATEMENT_DESCRIPTOR:BoardingHub}
  default-return-url: ${APP_PAYMENT_RETURN_URL:http://localhost:3000/dashboard?payment=complete}
